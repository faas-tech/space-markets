project_name: "Space Markets"
last_updated: "2026-03-14T00:00:00Z"

purpose:
  summary: |
    Tokenized asset leasing protocol for orbital infrastructure and real-world assets.
    Register assets on-chain, create lease agreements through a trustless marketplace,
    stream per-second USDC payments via Coinbase X402 protocol, and distribute revenue
    automatically to fractional ERC-20 token holders. Built on Base (EVM) with
    UUPS upgradeable Solidity contracts, a TypeScript offchain toolkit, and a Next.js
    frontend featuring an interactive 12-step protocol demo.
  tech_stack:
    - "Solidity 0.8.30 (Foundry, OpenZeppelin Upgradeable, UUPS, EIP-712)"
    - "TypeScript (Node.js 18+, ethers.js v6, Express, Vitest)"
    - "Next.js 14 (React 18, Tailwind CSS, wagmi v2, RainbowKit, viem)"
    - "Coinbase X402 V2 (@coinbase/x402 ^2.1.0)"
    - "Target: Base Sepolia (testnet) / Base Mainnet (production)"

repo_info:
  branches:
    main: "Production branch"
    202603-audit-fixes: "Current active branch — audit fixes and design system polish"

