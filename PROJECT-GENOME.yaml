architecture:
  overview: |
    Three-layer architecture: on-chain smart contracts for trustless state,
    offchain TypeScript services for Web2 integration, and a Next.js frontend
    for user interaction. Smart contracts are audited and frozen.
  patterns:
    - "UUPS Upgradeable Proxy (all 5 contracts)"
    - "EIP-712 Typed Data Signing (LeaseIntent, bids)"
    - "Service Layer Pattern (TypeScript services wrap contract calls)"
    - "MockDatabase for development (PostgreSQL migration path documented)"
    - "X402 HTTP 402 Payment Protocol (per-second streaming)"
  diagram: |
    Frontend (Next.js 14)
      ├── /protocol-demo  — 12-step interactive walkthrough
      ├── /market          — Spot + futures marketplace
      ├── /assets          — Registration + listing
      └── /api             — X402 access gating
          │
          ▼
    Offchain API (Express + TypeScript Services)
      ├── AssetService, LeaseService, MarketplaceService, RevenueService
      ├── X402PaymentService + FacilitatorClient
      └── EventProcessor (real-time blockchain events)
          │
          ▼
    Smart Contracts (Solidity 0.8.30 on Base)
      ├── AssetRegistry — schema + instance registration, deploys ERC-20
      ├── AssetERC20 — fractional ownership with ERC20Votes
      ├── LeaseFactory — ERC-721 Lease NFT from EIP-712 signed intents
      ├── Marketplace — offers, bids, escrow, revenue distribution
      └── MetadataStorage — content-addressed key-value store
  critical_constraint: |
    SMART CONTRACTS ARE LOCKED. Never modify src/*.sol, test/component/,
    test/integration/, or script/*.s.sol. All active work is in
    test/offchain/ and frontend/.

